<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci — Authentification Réussie</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts : Inter & Plus Jakarta Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    :root {
      --bg-subtle: #F8FAFC;
      --text-main: #0F172A;
      --text-muted: #475569;
      --accent-color: #2563EB;
      --border-color: #E2E8F0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-subtle);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .thank-you-box {
      background-color: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
      max-width: 520px;
      width: 90%;
      text-align: center;
    }

    .success-icon-wrapper {
      width: 72px;
      height: 72px;
      background-color: rgba(37, 99, 235, 0.08);
      color: var(--accent-color);
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      border-radius: 50%;
    }

    .thank-you-box h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--text-main);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .thank-you-box p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn-fintech {
      background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
      color: #FFFFFF;
      font-weight: 600;
      padding: 0.8rem 2rem;
      border-radius: 12px;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-fintech:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
      color: #FFFFFF;
    }

    @media (max-width: 576px) {
      .thank-you-box {
        padding: 2.5rem 1.5rem;
      }
      .thank-you-box h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>

  <div class="thank-you-box">
    <!-- Icône de validation moderne -->
    <div class="success-icon-wrapper">
      <i class="bi bi-shield-check"></i>
    </div>
    
    <h1 id="thankTitle">Merci !</h1>
    <p id="thankMessage">Votre demande d'authentification a bien été transmise. Notre système analyse actuellement vos informations de recharge.</p>
    
    <a href="index.html" class="btn-fintech" id="backHome">
      Retour à l'accueil
    </a>
  </div>

  <script>
    // Dictionnaire aligné exactement sur les langues de index_2.html et form.html
    const translations = {
      fr: {
        title: "Demande reçue",
        message: "Votre demande d'authentification a bien été transmise. Notre système analyse actuellement vos informations de recharge.",
        back: 'Retour à l\'accueil <i class="bi bi-arrow-right"></i>'
      },
      en: {
        title: "Request Received",
        message: "Your authentication request has been successfully submitted. Our system is currently analyzing your top-up details.",
        back: 'Back to homepage <i class="bi bi-arrow-right"></i>'
      },
      de: {
        title: "Anfrage Erhalten",
        message: "Ihre Authentifizierungsanfrage wurde erfolgreich übermittelt. Unser System analysiert derzeit Ihre Aufladedaten.",
        back: 'Zur Startseite <i class="bi bi-arrow-right"></i>'
      },
      it: {
        title: "Richiesta Ricevuta",
        message: "La tua richiesta di autenticazione è stata inviata con successo. Il nostro sistema sta attualmente analizzando i dettagli della tua ricarica.",
        back: 'Torna alla homepage <i class="bi bi-arrow-right"></i>'
      }
    };

    // Récupération de la clé globale définie par index_2.html
    const lang = localStorage.getItem('preferred_lang') || 'fr';

    // Application dynamique des contenus textuels
    if (translations[lang]) {
      document.getElementById('thankTitle').innerHTML = translations[lang].title;
      document.getElementById('thankMessage').innerHTML = translations[lang].message;
      document.getElementById('backHome').innerHTML = translations[lang].back;
    }
  </script>
</body>
</html>
